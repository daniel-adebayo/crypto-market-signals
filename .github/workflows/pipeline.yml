name: Crypto Pipeline Hourly

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Extraction (Python)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python dataload.py

      - name: Run Transformation (dbt)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd crypto_dbt
          dbt deps
          dbt run --profiles-dir .
          dbt test --profiles-dir .

      - name: Export Analytics Tables
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          mkdir -p data
          for table in fct_crypto_signals dim_coins fct_fx_rates fct_price_history; do
            echo "Exporting $table..."
            python -c "import duckdb; con = duckdb.connect('md:crypto_project?motherduck_token=${{ secrets.MOTHERDUCK_TOKEN }}'); con.execute(\"COPY analytics.$table TO 'data/$table.csv' (HEADER, DELIMITER ',')\")"
          done

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/*.csv
          git commit -m "Update analytics data [skip ci]" || echo "No changes to commit"
          git push