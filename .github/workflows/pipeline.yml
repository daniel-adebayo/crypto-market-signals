name: Crypto Pipeline Hourly

on:
  schedule:
    # This runs every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Extraction (Python)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python dataload.py

      - name: Run Transformation (dbt)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd crypto_dbt
          dbt deps
          # '--profiles-dir .' tells dbt to use the profiles.yml inside the crypto_dbt folder
          dbt run --profiles-dir .
          dbt test --profiles-dir .