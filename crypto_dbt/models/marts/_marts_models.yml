version: 2

models:
  - name: fct_crypto_signals
    description: "Hourly technical indicators for each coin."

  - name: fct_fx_rates
    description: "Daily USD/NGN rates with day-over-day change."
    columns:
      - name: fx_date
        data_tests:
          - unique
          - not_null

  - name: dim_coins
    description: "Lookup table for coin metadata."
    columns:
      - name: symbol
        data_tests:
          - unique
          - not_null
  - name: fct_price_history
    description: "Full hourly OHLC history in USD and NGN."
    data_tests:
      - unique:
          column_name: "(symbol || '-' || price_timestamp)"
      - not_null:
          column_name: price_timestamp