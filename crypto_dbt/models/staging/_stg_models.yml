version: 2

models:
  - name: stg_crypto_prices
    description: "Cleaned hourly price data from Binance"
    columns:
      - name: symbol
        tests:
          - not_null
      - name: price_timestamp
        description: "The start of the hourly candle"
        tests:
          - not_null
      - name: price_usd
        tests:
          - not_null

  - name: stg_fx_rates
    description: "Daily USD to NGN exchange rates"
    columns:
      - name: fx_date
        tests:
          - not_null
          - unique

  - name: stg_coins
    description: "Metadata for the top 10 coins we are tracking"
    columns:
      - name: symbol
        tests:
          - not_null
          - unique